<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Zelous for Jesus | Contact</title><link rel="stylesheet" href="assets/css/styles.css"></head>
<body>
  <div id="site-header"></div><div id="floating-social"></div><div id="live-banner"></div>
  <main>
    <section class="page-hero"><div class="container"><h1>Contact</h1><p>We would love to hear from you. Use these sample contact details and replace them with your church information.</p></div></section>
    <section class="section"><div class="container grid two-col">
      <div class="form-card"><h2>Get in touch</h2><p><strong>Email:</strong> hello@zelousforjesus.org</p><p><strong>Phone:</strong> +44 0000 000000</p><p><strong>Address:</strong> Add your church address here</p><p><strong>Service time:</strong> Sunday 10:30 AM</p></div>
      <form class="form-card" onsubmit="event.preventDefault(); alert('This sample form is ready to connect to your email or backend.');">
        <div class="field"><label for="name">Name</label><input id="name" required></div>
        <div class="field"><label for="email">Email</label><input id="email" type="email" required></div>
        <div class="field"><label for="message">Message</label><textarea id="message" required></textarea></div>
        <button class="btn" type="submit">Send message</button>
      </form>
    </div></section>
  </main>
  <div id="site-footer"></div><script src="assets/js/data.js"></script><script src="assets/js/app.js"></script>
</body>
</html>
